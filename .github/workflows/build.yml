name: Build Pygame APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip build-essential libssl-dev libffi-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev autoconf libtool pkg-config libltdl-dev

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Android SDK
        run: |
          SDK=$HOME/android-sdk
          mkdir -p $SDK/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d $SDK/cmdline-tools
          mv $SDK/cmdline-tools/cmdline-tools $SDK/cmdline-tools/latest
          rm cmdtools.zip
          export PATH=$SDK/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --sdk_root=$SDK --licenses > /dev/null 2>&1 || true
          sdkmanager --sdk_root=$SDK "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          mkdir -p $SDK/tools/bin
          printf '#!/bin/bash\nexec %s/cmdline-tools/latest/bin/sdkmanager "$@"\n' "$SDK" > $SDK/tools/bin/sdkmanager
          chmod +x $SDK/tools/bin/sdkmanager
          echo "SDK=$SDK" >> $GITHUB_ENV

      - name: Set up NDK r25b
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip
          unzip -q ndk.zip -d $HOME/.buildozer/android/platform/
          rm ndk.zip
          echo "✅ NDK r25b ready"

      - name: Wire SDK to buildozer
        run: |
          ln -sfn $HOME/android-sdk $HOME/.buildozer/android/platform/android-sdk

      - name: Patch p4a pygame recipe
        run: |
          P4A=$HOME/.buildozer/android/platform/python-for-android
          git clone --depth 1 https://github.com/kivy/python-for-android.git $P4A
          RECIPE=$P4A/pythonforandroid/recipes/pygame/__init__.py
          python3 -c "
          content = '''from pythonforandroid.recipe import CythonRecipe

class PygameRecipe(CythonRecipe):
    version = \"2.6.1\"
    url = \"https://github.com/pygame/pygame/archive/refs/tags/{version}.tar.gz\"
    name = \"pygame\"
    depends = [\"python3\", \"sdl2\", \"sdl2_image\", \"sdl2_mixer\", \"sdl2_ttf\", \"freetype\"]
    call_hostpython_via_targetpython = False
    install_in_hostpython = False

    def get_recipe_env(self, arch):
        env = super().get_recipe_env(arch)
        return env

    def prebuild_arch(self, arch):
        super().prebuild_arch(arch)
        import os
        sdl2_c = os.path.join(self.get_build_dir(arch.arch), \"src_c\", \"_sdl2\", \"sdl2.c\")
        if os.path.exists(sdl2_c):
            with open(sdl2_c, \"r\") as f:
                src = f.read()
            if \"longintrepr.h\" in src:
                src = src.replace(
                    \"#include \\\\\"longintrepr.h\\\\\"\",
                    \"#if PY_VERSION_HEX < 0x030C0000\\\\n#include \\\\\"longintrepr.h\\\\\"\\\\n#endif\"
                )
                with open(sdl2_c, \"w\") as f:
                    f.write(src)
                print(\"Patched longintrepr.h\")

recipe = PygameRecipe()
'''
          with open('$RECIPE', 'w') as f:
              f.write(content)
          print('Recipe written')
          "
          echo "p4a.source_dir = $P4A" >> buildozer.spec
          echo "✅ p4a patched and spec updated"

      - name: Cache Buildozer packages
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/packages
          key: buildozer-packages-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-packages-${{ runner.os }}-

      - name: Build APK
        run: |
          SDK=$HOME/android-sdk
          NDK=$HOME/.buildozer/android/platform/android-ndk-r25b
          export ANDROIDSDK=$SDK
          export ANDROIDNDK=$NDK
          export ANDROID_SDK_ROOT=$SDK
          export ANDROID_HOME=$SDK
          export PATH=$SDK/cmdline-tools/latest/bin:$SDK/build-tools/33.0.2:$SDK/platform-tools:$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          set +e
          buildozer -v android debug 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          echo "=== BUILD EXIT CODE: $BUILD_EXIT ==="
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== KEY ERRORS ==="
            grep -E "(ERROR|error:|fatal error|Traceback|Exception)" build.log | grep -v "^#" | tail -50
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pygame-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
