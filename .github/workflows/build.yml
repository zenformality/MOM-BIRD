name: Build Pygame APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libssl-dev libffi-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev autoconf libtool pkg-config libltdl-dev ccache

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Android SDK + install aidl
        run: |
          # Download command-line tools
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip
          mv cmdline-tools latest
          rm cmdtools.zip

          # Set env vars
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          # Accept licenses
          yes | sdkmanager --licenses > /dev/null 2>&1

          # Install build-tools (contains aidl) + platform + tools
          sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-33" \
            "platform-tools" \
            "tools"

          # Verify aidl is now available
          find $HOME/android-sdk -name "aidl" 2>/dev/null
          echo "✅ aidl installed"

      - name: Configure buildozer to use our SDK
        run: |
          # Point buildozer at the SDK we just set up
          mkdir -p ~/.buildozer/android/platform
          ln -sf $HOME/android-sdk ~/.buildozer/android/platform/android-sdk

      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: ${{ env.HOME }}/android-sdk
          ANDROIDSDK: ${{ env.HOME }}/android-sdk
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROIDSDK=$HOME/android-sdk
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/build-tools/34.0.0:$PATH
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pygame-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
