name: Build Pygame APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libssl-dev libffi-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev autoconf libtool pkg-config libltdl-dev ccache

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Set up Android SDK manually (bypass buildozer SDK management)
        run: |
          SDK=$HOME/android-sdk
          mkdir -p $SDK/cmdline-tools

          # Download cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d $SDK/cmdline-tools
          mv $SDK/cmdline-tools/cmdline-tools $SDK/cmdline-tools/latest
          rm cmdtools.zip

          export PATH=$SDK/cmdline-tools/latest/bin:$PATH

          # Accept all licenses
          yes | sdkmanager --sdk_root=$SDK --licenses > /dev/null 2>&1 || true

          # Install required components
          sdkmanager --sdk_root=$SDK \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

          # Verify aidl
          find $SDK -name "aidl" && echo "✅ aidl OK"

          # Create tools/bin/sdkmanager shim — THIS is what buildozer looks for
          mkdir -p $SDK/tools/bin
          cat > $SDK/tools/bin/sdkmanager << 'EOF'
          #!/bin/bash
          exec $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "$@"
          EOF
          chmod +x $SDK/tools/bin/sdkmanager

          echo "SDK=$SDK" >> $GITHUB_ENV

      - name: Set up Android NDK r25b
        run: |
          NDK_DIR=$HOME/android-sdk/ndk/25.2.9519653
          mkdir -p $NDK_DIR

          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip
          unzip -q ndk.zip
          cp -r android-ndk-r25b/. $NDK_DIR/
          rm -rf android-ndk-r25b ndk.zip

          # Also place where buildozer expects it
          mkdir -p $HOME/.buildozer/android/platform
          cp -r $NDK_DIR $HOME/.buildozer/android/platform/android-ndk-r25b

          echo "✅ NDK r25b ready"
          ls $HOME/.buildozer/android/platform/android-ndk-r25b/toolchains/llvm/prebuilt/linux-x86_64/bin/clang

      - name: Wire buildozer to our SDK
        run: |
          SDK=$HOME/android-sdk

          # Hard-link SDK into buildozer's expected path
          mkdir -p $HOME/.buildozer/android/platform
          ln -sfn $SDK $HOME/.buildozer/android/platform/android-sdk

          # Verify the shim works
          $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --version && echo "✅ sdkmanager shim works"

      - name: Cache Buildozer packages
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/packages
          key: buildozer-packages-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-packages-${{ runner.os }}-

      - name: Build APK
        run: |
          SDK=$HOME/android-sdk
          NDK=$HOME/.buildozer/android/platform/android-ndk-r25b

          export ANDROIDSDK=$SDK
          export ANDROIDNDK=$NDK
          export ANDROID_SDK_ROOT=$SDK
          export ANDROID_HOME=$SDK
          export PATH=$SDK/cmdline-tools/latest/bin:$SDK/build-tools/33.0.2:$SDK/platform-tools:$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH

          set +e
          buildozer -v android debug 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          echo "=== BUILD EXIT CODE: $BUILD_EXIT ==="
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== KEY ERRORS ==="
            grep -E "(ERROR|error:|fatal error|Traceback|Exception)" build.log \
              | grep -v "^#" | tail -50
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pygame-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
