name: Build Pygame APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libssl-dev libffi-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev autoconf libtool pkg-config libltdl-dev ccache

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Install aidl + build-tools into existing SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "platform-tools"
          find $ANDROID_HOME -name "aidl" && echo "✅ aidl found" || echo "❌ aidl missing"

      - name: Configure buildozer SDK path
        run: |
          mkdir -p ~/.buildozer/android/platform
          ln -sf $ANDROID_HOME ~/.buildozer/android/platform/android-sdk
          echo "ANDROIDSDK=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-ndk-r25b
            ~/.buildozer/android/packages
          key: buildozer-ndk-${{ runner.os }}-r25b
          restore-keys: buildozer-ndk-${{ runner.os }}-

      - name: Build APK
        run: |
          export ANDROIDSDK=$ANDROID_HOME
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$ANDROID_HOME/build-tools/33.0.2:$ANDROID_HOME/platform-tools:$PATH

          set +e
          buildozer -v android debug 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          echo "=== BUILD EXIT CODE: $BUILD_EXIT ==="
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== KEY ERRORS ==="
            grep -E "(ERROR|error:|fatal error|Traceback|Exception)" build.log \
              | grep -v "^#" | tail -40
            exit 1
          fi

      - name: List bin folder
        run: ls -lh bin/ 2>/dev/null || echo "bin/ folder does not exist"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pygame-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
